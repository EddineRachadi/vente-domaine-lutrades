<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuTrades.com est à vendre</title>
<meta name="description" content="Le nom de domaine LuTrades.com est disponible à l'achat. Faites votre offre dès maintenant.">
<style>
  :root {
    --gold: #C2AF34;
    --dark: #0b0b0d;
    --dark2: #16161a;
    --text: #f5f5f0;
    --muted: #a8a8a0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--dark);
    color: var(--text);
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    background:
      radial-gradient(circle at 20% 20%, rgba(194,175,52,0.08), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(194,175,52,0.06), transparent 40%),
      var(--dark);
  }
  .card {
    width: 100%;
    max-width: 640px;
    background: var(--dark2);
    border: 1px solid rgba(194,175,52,0.25);
    border-radius: 20px;
    padding: 56px 40px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .domain {
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .domain span { color: var(--gold); }
  .badge {
    display: inline-block;
    margin: 18px 0 8px;
    padding: 6px 16px;
    border: 1px solid var(--gold);
    border-radius: 999px;
    color: var(--gold);
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  p.lead {
    margin-top: 18px;
    color: var(--muted);
    font-size: 1.05rem;
    line-height: 1.6;
  }
  .cta {
    margin-top: 36px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
  }
  .btn {
    display: inline-block;
    width: 100%;
    max-width: 360px;
    padding: 14px 28px;
    border-radius: 12px;
    font-weight: 700;
    text-decoration: none;
    font-size: 1rem;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn-primary {
    background: var(--gold);
    color: #1a1a1a;
  }
  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.25);
  }
  .footer {
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 0.85rem;
    color: var(--muted);
  }
  .footer a { color: var(--gold); text-decoration: none; }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">Nom de domaine à vendre</div>
    <h1 class="domain">Lu<span>Trades</span>.com</h1>
    <p class="lead">
      Ce nom de domaine premium est disponible à l'achat.
      Court, mémorable et idéal pour un projet lié au trading,
      à l'e-commerce ou à une marketplace.
    </p>
    <div class="cta">
      <a class="btn btn-primary" href="https://sedo.com/search/?rel=1&special_inventory=1&orderdirection=1&keyword=lutrades&cc%5B0%5D=com" target="_blank" rel="noopener">
        Faire une offre sur Sedo
      </a>
      <a class="btn btn-secondary" href="mailto:eddinerachadi@rachadifils.com?subject=Offre%20pour%20LuTrades.com">
        Nous contacter directement
      </a>
    </div>
    <div class="footer">
      © 2026 LuTrades.com — Tous droits réservés
    </div>
  </div>
</body>
</html>
